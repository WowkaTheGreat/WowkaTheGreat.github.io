<!DOCTYPE html>
<html> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightSaberPvPTrainer</title>
<style>
    body{
        font-family: Arial;
        background: radial-gradient(circle, #2a1244, #0d0615);
        margin: 0;
        height: 100vh;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        user-select: none;
    }

    /* PANEL */
    .panel{
        background: #140a22;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 0 30px #000;
    }

    /* GRID */
    .grid{
        display: grid;
        grid-template-columns: repeat(3, 1fr);
    }

    /* BUTTON BASE */
    button{
        width: 80px;
        height: 80px;
        margin: 10px;
        font-size: 18px;
        border-radius: 12px;
        cursor: pointer;
        border: 2px solid;
        transition: all 0.2s ease;
        outline: none;
    }

    /* 🔴 RED */
    .button-red{
        color: #ff4d4d;
        background: radial-gradient(circle, #000, #330000);
        border-color: #ff4d4d;
        box-shadow: 0 0 10px #ff0000, inset 0 0 10px #ff0000;
    }

    /* 🟢 GREEN */
    .button-green{
        color: #00ff88;
        background: radial-gradient(circle, #000, #003300);
        border-color: #00ff88;
        box-shadow: 0 0 10px #00ff88, inset 0 0 10px #00ff88;
    }

    button:hover{
        transform: scale(1.1);
    }

    button:active{
        transform: scale(0.9);
    }

    /* INPUT */
    input{
        margin-top: 20px;
        padding: 10px;
        width: 120px;
        text-align: center;
        border-radius: 10px;
        border: none;
        outline: none;
        background: #0d0615;
        color: #fff;
        box-shadow: inset 0 0 10px #000;
    }

    /* CONTROL PANEL */
    .controls{
        margin-top: 20px;
    }

    .controls button{
        width: 100px;
    }

    @keyframes disco{
        0% { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(360deg); }
    }

    .disco button{
        animation: disco 2s linear infinite;
    }
</style>
</head>
<body>
    <div class="panel">

        <div class="grid">
            <button onclick="cBS(1,1)" class="button-green" id="11">L1</button>
            <button onclick="cBS(3,1)" class="button-green" id="31">S1</button>
            <button onclick="cBS(2,1)" class="button-green" id="21">P1</button>

            <button onclick="cBS(1,2)" class="button-green" id="12">L2</button>
            <button onclick="cBS(3,2)" class="button-green" id="32">S2</button>
            <button onclick="cBS(2,2)" class="button-green" id="22">P2</button>

            <button onclick="cBS(1,3)" class="button-green" id="13">L3</button>
            <button onclick="cBS(3,3)" class="button-green" id="33">S3</button>
            <button onclick="cBS(2,3)" class="button-green" id="23">P3</button>
        </div>

        <input type="number" id="interval" placeholder="sekundy">

        <div class="controls">
            <button class="button-green" onclick="loop()">START</button>
            <button class="button-red" onclick="stopLoop()">STOP</button>
        </div>

    </div>
    <script>
        const intervalElement = document.getElementById("interval");
        const buttons = [
            [true, true, true],
            [true, true, true],
            [true, true, true]
        ];
        const voices = {
            "11": new Audio("voices/L1.mp3"),
            "12": new Audio("voices/L2.mp3"),
            "13": new Audio("voices/L3.mp3"),
            "31": new Audio("voices/S1.mp3"),
            "32": new Audio("voices/S2.mp3"),
            "33": new Audio("voices/S3.mp3"),
            "21": new Audio("voices/P1.mp3"),
            "22": new Audio("voices/P2.mp3"),
            "23": new Audio("voices/P3.mp3"),
            "bonus": new Audio("voices/BONUS.mp3")
        };

        /* TOGGLE BUTTON */
        function cBS(side, number)// -> changeButtonStatus
        {
            const state = buttons[side - 1][number - 1];
            buttons[side - 1][number - 1] = !state;

            const btn = document.getElementById("" + side + number);
            btn.className = state ? "button-red" : "button-green";
        }

        /* RANDOM SOUND */
        function getRandomVoice()
        {
            let active = [];
            for(let i = 0; i < buttons.length; i++){
                for(let j = 0; j < buttons[i].length; j++){
                    if(buttons[i][j]){
                        active.push("" + (i + 1) + (j + 1));
                    }
                }
            }
            if(active.length === 0) return null;

            return voices[active[Math.floor(Math.random() * active.length)]];
        }

        /* INTERVAL */
        function getInterval()
        {
            let n = Number(intervalElement.value);
            if(n < 0 || isNaN(n)){
                intervalElement.value = 0;
                return 0;
            }
            return n * 1000;
        }

        /* LOOP SYSTEM */
        let isRunning = false;
        let timeoutId = null;
        let currentSound = null;
        let shouldPlayBonus = false;
        let playingBonus = false;
        function playBonus()
        {
            const bonus = voices["bonus"];
            bonus.currentTime = 0;
            bonus.play();
            bonus.onended = () => {
                playingBonus = false;
            };
        }


        let wakeLock = null;

        async function keepScreenOn() 
        {
            try{
                wakeLock = await navigator.wakeLock.request('screen');
            }catch(err){
                console.log(err);
            }
        }

        function loop()
        {
            if(isRunning || playingBonus) return;

            keepScreenOn();

            isRunning = true;
            document.body.classList.add("disco");
            playNext();
        }

        function stopLoop(bonus = true)
        {
            if(isRunning && bonus){
                playingBonus = true;
                if(currentSound && !currentSound.paused){
                    shouldPlayBonus = true;
                }else{
                    playBonus();
                }
            }
            isRunning = false;
            document.body.classList.remove("disco");
            if(timeoutId){ 
                clearTimeout(timeoutId);
                timeoutId = null;
            }
        }

        function playNext()
        {
            if(!isRunning) return;

            currentSound = getRandomVoice();
            if(!currentSound){
                stopLoop(false);
                return;
            }

            currentSound.currentTime = 0;
            currentSound.play();

            currentSound.onended = () => {
                if(shouldPlayBonus){
                    shouldPlayBonus = false;
                    playBonus();
                    currentSound = null;
                    return;
                }

                if(!isRunning) return;
                timeoutId = setTimeout(playNext, getInterval());
            };
        }
    </script>
</body>
</html>
